AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for deploying Lambda function for Rock Paper Scissors'

Parameters:
  LambdaIamRoleArn:
    Type: String
    Description: ARN of the existing IAM role for Lambda execution
  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda ZIP package
  CodeS3Key:
    Type: String
    Description: S3 key for the Lambda ZIP package

Resources:
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RockPaperScissorsUserActions
      Runtime: python3.11
      Role: !Ref LambdaIamRoleArn
      Handler: user_actions.lambda_handler
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Layers:
        - arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python311:28

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction