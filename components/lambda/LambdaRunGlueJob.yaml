AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Triggering Glue Job'

Parameters:
  LambdaIamRoleArn:
    Type: String
    Description: ARN of the existing IAM role for Lambda execution
  
  CodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda ZIP package
  
  CodeS3Key:
    Type: String
    Description: S3 key for the Lambda ZIP package
  

Resources:
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RPSRunGlueJob
      Runtime: python3.11
      Role: !Ref LambdaIamRoleArn
      Handler: Trigger_GlueJob.lambda_handler
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
    

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction