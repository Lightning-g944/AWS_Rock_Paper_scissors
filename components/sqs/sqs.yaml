AWSTemplateFormatVersion: '2010-09-09'
Description: 'SQS queue for Rock Paper Scissors pipeline game results'

Parameters:
  QueueName:
    Type: String
    Default: 'rps-game-results'
    Description: Name of the SQS queue

  S3BucketName:
    Type: String
    Description: Name of the S3 bucket allowed to send notifications to this queue

Resources:
  GameResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 300  # 5 minutes
      MessageRetentionPeriod: 345600  # 4 days
      DelaySeconds: 0
      MaximumMessageSize: 262144  # 256 KB
      ReceiveMessageWaitTimeSeconds: 0

  # Optional: Dead Letter Queue for failed messages
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${QueueName}-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
  
  # SQS Queue Policy to allow S3 to send messages
  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref GameResultsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ToSendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt GameResultsQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${S3BucketName}'

Outputs:
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref GameResultsQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueURL'

  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt GameResultsQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'

  DeadLetterQueueArn:
    Description: ARN of the dead letter queue
    Value: !GetAtt DeadLetterQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DLQArn'