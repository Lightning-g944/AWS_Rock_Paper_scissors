AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 buckets for Rock Paper Scissors AWS pipeline'

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'rps-pipeline'
    Description: Prefix for S3 bucket names
  SQSQueueArn:
    Type: String
    Description: ARN of the SQS queue for S3 event notifications
  # LambdaFunctionName:
  #   Type: String
  #   Default: 'RPSLambdaFunction'
  #   Description: Name of the Lambda function to trigger on S3 events

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-landing-zone'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'Landing/'
            Queue: !Ref SQSQueueArn
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowGlueJobAccess
            Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${S3Bucket}
              - !Sub arn:aws:s3:::${S3Bucket}/*
          - Sid: AllowLambdaAccess
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${S3Bucket}
              - !Sub arn:aws:s3:::${S3Bucket}/*

Outputs:
  S3BucketName:
    Description: Name of the single pipeline S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  ArtifactsPrefix:
    Description: Prefix for storing templates and scripts
    Value: artifacts
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsPrefix'

  LandingZonePrefix:
    Description: Prefix for incoming files and event triggers
    Value: landing-zone
    Export:
      Name: !Sub '${AWS::StackName}-LandingZonePrefix'

  OutputPrefix:
    Description: Prefix for final output files
    Value: output
    Export:
      Name: !Sub '${AWS::StackName}-OutputPrefix'
